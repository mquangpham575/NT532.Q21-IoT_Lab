<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Edge Node</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        #video { width: 100%; max-width: 500px; border-radius: 10px; border: 2px solid #333; }
        #canvas { display: none; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 10px; background: #1e1e1e; display: inline-block; min-width: 200px; }
        .name { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .status { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Edge Server Node</h1>
    <button id="startBtn" style="padding: 15px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 5px; margin-bottom: 20px;">Start Camera</button>
    <button id="captureBtn" style="padding: 15px; font-size: 18px; background: #FF9800; color: white; border: none; border-radius: 5px; margin-bottom: 20px; display:none;">Capture & Detect</button>
    <button id="switchBtn" style="padding: 15px; font-size: 18px; background: #2196F3; color: white; border: none; border-radius: 5px; margin-bottom: 20px; display:none;">Switch Camera</button>
    
    <div style="margin-bottom: 20px;">
        <input type="checkbox" id="autoMode" checked> <label for="autoMode" style="color: #aaa;">Auto-Detection Loop</label>
    </div>

    <div id="errorMsg" style="color: #ff4444; margin-bottom: 10px;"></div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div class="result-box">
        <div class="status">Identity:</div>
        <div id="identity" class="name">Waiting...</div>
        <div id="latency" class="status">Latency: --ms</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const identityDisplay = document.getElementById('identity');
        const latencyDisplay = document.getElementById('latency');
        const startBtn = document.getElementById('startBtn');
        const captureBtn = document.getElementById('captureBtn');
        const switchBtn = document.getElementById('switchBtn');
        const autoMode = document.getElementById('autoMode');
        const errorMsg = document.getElementById('errorMsg');

        let currentFacingMode = "user";
        let stream = null;

        async function setupCamera() {
            try {
                if (stream) stream.getTracks().forEach(track => track.stop());
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
                video.srcObject = stream;
                video.style.display = "block";
                startBtn.style.display = "none";
                captureBtn.style.display = "inline-block";
                switchBtn.style.display = "inline-block";
                if (autoMode.checked) captureAndRecognize();
            } catch (e) {
                errorMsg.innerText = "ERROR: " + e.message;
            }
        }

        async function captureAndRecognize() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const base64Data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            const startTime = performance.now();
            
            const formData = new FormData();
            formData.append('image', base64Data);
            formData.append('w', canvas.width);
            formData.append('h', canvas.height);

            try {
                const response = await fetch('/recog', { method: 'POST', body: formData });
                const name = await response.text();
                const latency = (performance.now() - startTime).toFixed(2);

                identityDisplay.innerText = name;
                latencyDisplay.innerText = `Latency: ${latency}ms`;
                identityDisplay.style.color = name === "Unknown" ? "#ff4444" : "#4CAF50";
            } catch (e) { console.error(e); }

            if (autoMode.checked) setTimeout(captureAndRecognize, 500);
        }

        startBtn.onclick = setupCamera;
        captureBtn.onclick = captureAndRecognize;
        switchBtn.onclick = () => { currentFacingMode = currentFacingMode === "user" ? "environment" : "user"; setupCamera(); };
    </script>
</body>
</html>
